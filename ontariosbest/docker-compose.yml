version: '3.9'

# =============================================================================
# OntariosBest.com — Local Development Environment
# Usage:
#   docker compose up -d
#   open http://localhost:8080
#   docker compose exec wpcli bash   (run WP-CLI commands)
#   docker compose down              (stop)
#   docker compose down -v           (stop + delete database)
# =============================================================================

services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ontariosbest
      MYSQL_USER:          wp
      MYSQL_PASSWORD:      wp_local_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wpnet

  wordpress:
    image: wordpress:6.4-php8.2-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST:     db:3306
      WORDPRESS_DB_NAME:     ontariosbest
      WORDPRESS_DB_USER:     wp
      WORDPRESS_DB_PASSWORD: wp_local_password
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_DEBUG:       1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8080');
        define('WP_SITEURL', 'http://localhost:8080');
        define('FS_METHOD', 'direct');
        define('DISALLOW_FILE_EDIT', false);
    volumes:
      # Mount our child theme directly (live reload on file changes)
      - ./wordpress/theme:/var/www/html/wp-content/themes/ontariosbest:ro
      # Persist uploads and plugin installs
      - wp_uploads:/var/www/html/wp-content/uploads
      - wp_plugins:/var/www/html/wp-content/plugins
      - wp_languages:/var/www/html/wp-content/languages
    networks:
      - wpnet

  wpcli:
    image: wordpress:cli-php8.2
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    user: "33:33"   # www-data
    environment:
      WORDPRESS_DB_HOST:     db:3306
      WORDPRESS_DB_NAME:     ontariosbest
      WORDPRESS_DB_USER:     wp
      WORDPRESS_DB_PASSWORD: wp_local_password
    volumes:
      - ./wordpress/theme:/var/www/html/wp-content/themes/ontariosbest:ro
      - ./wordpress/acf:/acf:ro
      - ./deploy.sh:/deploy.sh:ro
      - wp_uploads:/var/www/html/wp-content/uploads
      - wp_plugins:/var/www/html/wp-content/plugins
    working_dir: /var/www/html
    networks:
      - wpnet
    # Keep container alive so you can exec into it
    entrypoint: ["sh", "-c", "sleep infinity"]

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST:     db
      PMA_USER:     wp
      PMA_PASSWORD: wp_local_password
    networks:
      - wpnet

volumes:
  db_data:
  wp_uploads:
  wp_plugins:
  wp_languages:

networks:
  wpnet:
    driver: bridge
